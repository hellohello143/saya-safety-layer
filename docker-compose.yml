# One-command local stack. Prereqs: Docker, and a filled-in .env (run
#   docker compose run --rm backend npm run setup
# once to validate CDP creds + fund the treasury).
#
#   docker compose up                 # backend + dashboard (:3000) + mock seller (:4021)
#   docker compose --profile demo up  # also runs the agent-sim once against them
#
# API auth: /api/* is gated by API_TOKEN (auto-generated by `npm run setup`, or set
# your own in .env). Terminate TLS in front of this if internet-facing — see the
# README "Security & production readiness". HOST=0.0.0.0 is for the container network.

services:
  backend:
    build: .
    env_file: .env
    environment:
      HOST: 0.0.0.0
      DATABASE_URL: /app/data/safety-layer.db
    ports:
      - "3000:3000"
    volumes:
      - safety-data:/app/data
    command: ["npx", "tsx", "src/index.ts"]
    # /health is open (no token); readiness gates the demo runner below.
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:'+(process.env.PORT||3000)+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  mock-seller:
    build: .
    env_file: .env
    environment:
      HOST: 0.0.0.0
    ports:
      - "4021:4021"
    command: ["npx", "tsx", "mock-seller/server.ts"]
    # A 402 (no X-PAYMENT) still means the seller is up — any response passes.
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:'+(process.env.MOCK_SELLER_PORT||4021)+'/resource').then(()=>process.exit(0)).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  # Demo/test harness. Runs once, then exits. Enable with `--profile demo`.
  agent-sim:
    build: .
    env_file: .env
    environment:
      BACKEND_URL: http://backend:3000
      MOCK_SELLER_URL: http://mock-seller:4021/resource
    # Wait until both are actually healthy, not just started (avoids ECONNREFUSED).
    depends_on:
      backend:
        condition: service_healthy
      mock-seller:
        condition: service_healthy
    profiles: ["demo"]
    command: ["npx", "tsx", "scripts/agent-sim.ts"]

volumes:
  safety-data:
